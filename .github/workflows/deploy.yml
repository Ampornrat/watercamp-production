name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: smartcms/water-data-camp
  OPENSHIFT_NAMESPACE: cust-sms
  IMAGESTREAM: water-data-camp
  DEPLOYMENT: water-data-camp

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract short SHA
        id: meta
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.meta.outputs.sha }}
          build-args: |
            VITE_SUPABASE_PROJECT_ID=${{ secrets.VITE_SUPABASE_PROJECT_ID }}
            VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # NOTE: OpenShift API (api.container-platform.inet.co.th:6443) is firewalled to
      # Thai IPs only, so GitHub-hosted runners cannot reach it. Image is pushed to
      # Docker Hub above; the OpenShift ImageStream's scheduled poll (~15 min) picks
      # up the new digest and rolls out the Deployment automatically.
      #
      # To make rollout instant, run a self-hosted runner inside the INET-reachable
      # network and re-add the redhat-actions/oc-login + import-image + rollout steps.

      - name: Summary
        run: |
          echo "Image pushed: docker.io/${IMAGE}:latest"
          echo "Image pushed: docker.io/${IMAGE}:${{ steps.meta.outputs.sha }}"
          echo "OpenShift will pull the new digest within ~15 minutes."
